name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Verify and release
    if: github.repository == 'janiorvalle/better-git-review'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write # GoReleaser creates the GitHub release
      id-token: write # build provenance attestation
      attestations: write # publish GitHub artifact attestations
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: go.mod
          cache: false
      - run: make build vet test release-check
      - name: Release
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.11.2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
